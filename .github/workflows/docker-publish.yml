name: Build and Push Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set release date tag
        id: release-date
        run: echo "tag=$(date -u +'%m-%d-%Y')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.release-date.outputs.tag }}
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create release for daily image
        uses: softprops/action-gh-release@v2
        with:
          tag_name: image-${{ steps.release-date.outputs.tag }}-${{ github.run_id }}
          name: Container image ${{ steps.release-date.outputs.tag }}
          body: |
            Container image for ${{ steps.release-date.outputs.tag }}:

            `ghcr.io/${{ github.repository }}:${{ steps.release-date.outputs.tag }}`
          make_latest: true
